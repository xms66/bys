<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>贝叶斯短线资金表</title>
  <style>
    body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background: #f6f7f9; color: #1f2933; }
    header { padding: 18px 28px; background: #fff; border-bottom: 1px solid #dde3ea; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 20px; margin: 0; }
    main { padding: 22px 28px; }
    button { border: 1px solid #2f6fed; background: #2f6fed; color: #fff; border-radius: 6px; padding: 9px 14px; cursor: pointer; margin-right: 8px; }
    .muted { color: #667085; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #dde3ea; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #eef1f4; text-align: left; font-size: 14px; }
    th { background: #f9fafb; font-weight: 700; }
    .toolbar { margin-bottom: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>每日滚动回测资金表</h1>
    <div class="muted">初始资金 100000，满仓买入，满仓卖出</div>
  </header>
  <main>
    <div class="toolbar">
      <button id="generate">生成今晚决策</button>
      <button id="refresh">刷新表格</button>
      <span class="muted" id="status"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>LLM决策结果</th>
          <th>股票</th>
          <th>动作</th>
          <th>价格</th>
          <th>股数</th>
          <th>收益率</th>
          <th>资金</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>
  <script>
    const fmtMoney = v => v == null ? "" : Number(v).toFixed(2);
    const fmtPct = v => v == null ? "" : (Number(v) * 100).toFixed(2) + "%";

    async function load() {
      const res = await fetch("/api/backtest/history");
      const data = await res.json();
      document.getElementById("rows").innerHTML = data.rows.map(row => `
        <tr>
          <td>${row.date}</td>
          <td>${row.decision}</td>
          <td>${row.code || ""} ${row.name || ""}</td>
          <td>${row.action}</td>
          <td>${fmtMoney(row.price)}</td>
          <td>${row.shares || ""}</td>
          <td>${fmtPct(row.profit_pct)}</td>
          <td>${fmtMoney(row.capital)}</td>
        </tr>
      `).join("");
    }

    async function generate() {
      document.getElementById("status").textContent = "生成中...";
      const res = await fetch("/api/plans/generate", { method: "POST", headers: {"Content-Type": "application/json"}, body: "{}" });
      const data = await res.json();
      document.getElementById("status").textContent = `计划: ${data.plan.decision} ${data.plan.code || ""} ${data.plan.name || ""}`;
      await load();
    }

    document.getElementById("refresh").addEventListener("click", load);
    document.getElementById("generate").addEventListener("click", generate);
    load();
  </script>
</body>
</html>

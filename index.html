<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同花顺热榜贝叶斯短线</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
  background: #f4f5f7;
  color: #20242a;
}
.topbar {
  background: #ed1c24;
  color: #fff;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand h1 { margin: 0; font-size: 22px; line-height: 1.2; }
.brand span { display: block; margin-top: 4px; font-size: 12px; opacity: .85; }
.status { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 13px; }
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid rgba(255,255,255,.45);
  border-radius: 999px;
  padding: 6px 10px;
  background: rgba(255,255,255,.12);
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #28c76f; }
button {
  border: 0;
  background: #20242a;
  color: #fff;
  border-radius: 6px;
  padding: 8px 12px;
  cursor: pointer;
  font-weight: 600;
}
button:disabled { opacity: .55; cursor: default; }
.shell { max-width: 1600px; margin: 0 auto; padding: 16px; }
.metrics {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 14px;
}
.metric {
  background: #fff;
  border: 1px solid #dde1e7;
  border-radius: 8px;
  padding: 14px;
}
.metric label { display: block; color: #6d747d; font-size: 12px; margin-bottom: 8px; }
.metric strong { font-size: 24px; }
.workspace {
  display: grid;
  grid-template-columns: minmax(360px, 1.1fr) minmax(420px, 1.25fr) minmax(340px, .95fr);
  gap: 14px;
  align-items: start;
}
.panel {
  background: #fff;
  border: 1px solid #dde1e7;
  border-radius: 8px;
  min-height: 560px;
  overflow: hidden;
}
.panel-head {
  padding: 14px 16px;
  border-bottom: 1px solid #e6e9ee;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.panel-head h2 { margin: 0; font-size: 16px; }
.panel-head span { color: #7a828c; font-size: 12px; }
.list { max-height: calc(100vh - 220px); overflow: auto; }
.hot-row, .analysis-row {
  display: grid;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid #eef0f3;
  cursor: pointer;
}
.hot-row { grid-template-columns: 44px minmax(0, 1fr) 82px 86px; }
.analysis-row { grid-template-columns: 46px minmax(0, 1fr) 116px 78px; }
.hot-row:hover, .analysis-row:hover, .selected { background: #fff4f4; }
.rank {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  background: #9aa2ad;
  font-weight: 700;
}
.rank.top1 { background: #ed1c24; }
.rank.top2 { background: #ff8a2a; }
.rank.top3 { background: #f5bf28; }
.stock-name { font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stock-code { color: #7a828c; font-size: 12px; margin-top: 3px; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
.tag {
  border: 1px solid #d7dce3;
  color: #626a74;
  border-radius: 4px;
  padding: 2px 5px;
  font-size: 11px;
  max-width: 112px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tag.hot { border-color: #ffb9bd; color: #d71920; background: #fff1f2; }
.num { font-variant-numeric: tabular-nums; text-align: right; }
.up { color: #d71920; }
.down { color: #15935b; }
.muted { color: #7a828c; }
.prob {
  display: flex;
  align-items: center;
  gap: 8px;
}
.bar {
  flex: 1;
  height: 8px;
  background: #edf0f4;
  border-radius: 999px;
  overflow: hidden;
}
.bar > i {
  display: block;
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, #f5bf28, #ed1c24);
}
.signal {
  display: inline-flex;
  justify-content: center;
  min-width: 62px;
  border-radius: 4px;
  padding: 4px 6px;
  background: #fff1f2;
  color: #d71920;
  font-size: 12px;
  font-weight: 700;
}
.detail { padding: 16px; }
.detail-title { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 12px; }
.detail-title h3 { margin: 0; font-size: 20px; }
.big-prob { font-size: 30px; font-weight: 800; color: #d71920; }
.section-title {
  margin: 18px 0 8px;
  color: #535b65;
  font-size: 13px;
  font-weight: 700;
}
.step {
  display: grid;
  grid-template-columns: 86px 1fr 54px;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #eef0f3;
  font-size: 13px;
}
.step .bar { height: 6px; }
.facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.fact {
  background: #f7f8fa;
  border: 1px solid #e6e9ee;
  border-radius: 6px;
  padding: 9px;
}
.fact label { display: block; color: #7a828c; font-size: 11px; margin-bottom: 5px; }
.fact strong { font-size: 14px; }
.notice {
  margin-top: 12px;
  border: 1px solid #f2d0a4;
  background: #fff8ed;
  color: #795108;
  border-radius: 6px;
  padding: 10px;
  font-size: 12px;
  line-height: 1.55;
}
.risk-list { margin: 8px 0 0; padding-left: 18px; color: #626a74; font-size: 12px; line-height: 1.6; }
.empty { padding: 28px; color: #7a828c; text-align: center; }
@media (max-width: 1200px) {
  .workspace { grid-template-columns: 1fr; }
  .list { max-height: none; }
}
@media (max-width: 720px) {
  .topbar { align-items: flex-start; flex-direction: column; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .hot-row { grid-template-columns: 38px minmax(0, 1fr) 72px; }
  .hot-row .heat { display: none; }
  .analysis-row { grid-template-columns: 38px minmax(0, 1fr); }
  .analysis-row .prob, .analysis-row .signal-wrap { grid-column: 2; }
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <h1>同花顺热榜贝叶斯短线</h1>
    <span>热股 · 大家都在看 · 1小时 · T+1买入赚钱概率</span>
  </div>
  <div class="status">
    <span class="pill"><i class="dot" id="statusDot"></i><span id="statusText">连接中</span></span>
    <span class="pill" id="dataSource">数据源 --</span>
    <span class="pill" id="currentTime">--:--:--</span>
    <button id="btnRefresh" onclick="refreshAll()">刷新</button>
  </div>
</header>

<main class="shell">
  <section class="metrics">
    <div class="metric"><label>市场热度</label><strong id="marketHeat">--</strong><div class="muted" id="marketPhase">--</div></div>
    <div class="metric"><label>上涨 / 下跌</label><strong><span class="up" id="upCount">--</span> / <span class="down" id="downCount">--</span></strong></div>
    <div class="metric"><label>平均换手</label><strong id="avgTurnover">--</strong><div class="muted">平均涨幅 <span id="avgChange">--</span></div></div>
    <div class="metric"><label>候选股票</label><strong id="stockTotal">--</strong><div class="muted">同花顺热榜前50</div></div>
  </section>

  <section class="workspace">
    <div class="panel">
      <div class="panel-head"><h2>同花顺热榜前50</h2><span id="hotTimestamp">--</span></div>
      <div class="list" id="hotRankList"><div class="empty">加载中</div></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>贝叶斯 T+1 概率</h2><span>按交易排序分排列</span></div>
      <div class="list" id="analysisList"><div class="empty">加载中</div></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>决策过程</h2><span>先验到后验</span></div>
      <div class="detail" id="decisionDetail"><div class="empty">选择一只股票查看过程</div></div>
    </div>
  </section>
</main>

<script>
const API_BASE = `${window.location.origin}/api`;
let hotStocks = [];
let analysisRows = [];
let selectedCode = "";

function updateTime() {
  document.getElementById("currentTime").textContent =
    new Date().toLocaleTimeString("zh-CN", { hour12: false });
}
setInterval(updateTime, 1000);
updateTime();

function fmt(v, d = 2) {
  if (v === null || v === undefined || Number.isNaN(Number(v))) return "--";
  return Number(v).toFixed(d);
}
function pctClass(v) { return Number(v) >= 0 ? "up" : "down"; }
function pct(v, d = 2) { return `${fmt(v, d)}%`; }
function rankClass(rank) {
  if (rank === 1) return "rank top1";
  if (rank === 2) return "rank top2";
  if (rank === 3) return "rank top3";
  return "rank";
}
function tagsHtml(tags = [], hot = "") {
  const parts = [];
  if (hot) parts.push(`<span class="tag hot">${hot}</span>`);
  tags.slice(0, 3).forEach(t => parts.push(`<span class="tag">${t}</span>`));
  return parts.join("");
}
function selectStock(code) {
  selectedCode = code;
  renderHotRank();
  renderAnalysis();
  renderDecision();
}

async function updateStatus() {
  const r = await fetch(`${API_BASE}/status`);
  const d = await r.json();
  document.getElementById("statusText").textContent = d.status === "ok" ? "运行中" : "异常";
  document.getElementById("dataSource").textContent = d.data_source || "--";
}

async function loadHotRank() {
  const r = await fetch(`${API_BASE}/hot_rank?top_n=50&sort=hot_rank`);
  const d = await r.json();
  hotStocks = d.stocks || [];
  document.getElementById("hotTimestamp").textContent = d.timestamp || "--";
  document.getElementById("stockTotal").textContent = hotStocks.length;
  renderHotRank();
}

function renderHotRank() {
  const el = document.getElementById("hotRankList");
  if (!hotStocks.length) {
    el.innerHTML = `<div class="empty">暂无数据</div>`;
    return;
  }
  el.innerHTML = hotStocks.map(s => `
    <div class="hot-row ${s.code === selectedCode ? "selected" : ""}" onclick="selectStock('${s.code}')">
      <div><span class="${rankClass(s.rank)}">${s.rank}</span></div>
      <div>
        <div class="stock-name">${s.name}</div>
        <div class="stock-code">${s.code}</div>
        <div class="tags">${tagsHtml(s.concept_tags, s.popularity_tag)}</div>
      </div>
      <div class="num ${pctClass(s.change_pct)}">${pct(s.change_pct)}</div>
      <div class="num heat muted">${fmt(s.hot_score, 0)} 热度</div>
    </div>
  `).join("");
}

async function loadAnalysis() {
  const r = await fetch(`${API_BASE}/analysis?top_n=50`);
  const d = await r.json();
  analysisRows = d.analysis || [];
  if (!selectedCode && analysisRows.length) selectedCode = analysisRows[0].code;
  if (d.market_state) {
    const ms = d.market_state;
    document.getElementById("marketHeat").textContent = ms.heat || "--";
    document.getElementById("marketPhase").textContent = `周期阶段 ${ms.cycle_phase ?? "--"}`;
    document.getElementById("upCount").textContent = ms.up_count ?? "--";
    document.getElementById("downCount").textContent = ms.down_count ?? "--";
    document.getElementById("avgTurnover").textContent = pct(ms.avg_turnover, 1);
    document.getElementById("avgChange").textContent = pct(ms.avg_change, 2);
  }
  renderAnalysis();
  renderDecision();
}

function renderAnalysis() {
  const el = document.getElementById("analysisList");
  if (!analysisRows.length) {
    el.innerHTML = `<div class="empty">暂无分析结果</div>`;
    return;
  }
  el.innerHTML = analysisRows.map(a => {
    const prob = Math.round((a.buy_prob || 0) * 100);
    return `
      <div class="analysis-row ${a.code === selectedCode ? "selected" : ""}" onclick="selectStock('${a.code}')">
        <div><span class="${rankClass(a.hot_rank || 0)}">${a.hot_rank || "-"}</span></div>
        <div>
          <div class="stock-name">${a.name}</div>
          <div class="stock-code">${a.code} · <span class="${pctClass(a.change_pct)}">${pct(a.change_pct)}</span></div>
          <div class="tags">${tagsHtml(a.concept_tags, a.popularity_tag)}</div>
        </div>
        <div class="prob">
          <div class="bar"><i style="width:${prob}%"></i></div>
          <strong>${prob}%</strong>
        </div>
        <div class="signal-wrap"><span class="signal">${a.signal || "观望"}</span></div>
      </div>
    `;
  }).join("");
}

function renderDecision() {
  const el = document.getElementById("decisionDetail");
  const row = analysisRows.find(x => x.code === selectedCode);
  if (!row) {
    el.innerHTML = `<div class="empty">选择一只股票查看过程</div>`;
    return;
  }
  const prob = Math.round((row.buy_prob || 0) * 100);
  const risk = row.risk_control || {};
  el.innerHTML = `
    <div class="detail-title">
      <div>
        <h3>${row.name}</h3>
        <div class="muted">${row.code} · 热榜第 ${row.hot_rank || "-"} · ${row.candle_pattern || "-"}</div>
      </div>
      <div class="num">
        <div class="big-prob">${prob}%</div>
        <div class="muted">T+1赚钱概率</div>
      </div>
    </div>
    <div class="tags">${tagsHtml(row.concept_tags, row.popularity_tag)}</div>
    <div class="section-title">关键特征</div>
    <div class="facts">
      <div class="fact"><label>热榜分</label><strong>${fmt(row.features?.hot_rank_score, 2)}</strong></div>
      <div class="fact"><label>概念传播</label><strong>${fmt(row.features?.concept_spread, 2)}</strong></div>
      <div class="fact"><label>K线分</label><strong>${fmt(row.features?.candle_score, 2)}</strong></div>
      <div class="fact"><label>量价活跃</label><strong>${fmt(row.features?.volume_activity_score, 2)}</strong></div>
      <div class="fact"><label>换手率</label><strong>${pct(row.turnover_rate, 1)}</strong></div>
      <div class="fact"><label>量比</label><strong>${fmt(row.volume_ratio, 2)}</strong></div>
    </div>
    <div class="section-title">风险控制</div>
    <div class="facts">
      <div class="fact"><label>风险等级</label><strong>${risk.risk_level || "--"}</strong></div>
      <div class="fact"><label>建议动作</label><strong>${risk.action || "--"}</strong></div>
      <div class="fact"><label>单票最大仓位</label><strong>${pct((risk.max_position_pct || 0) * 100, 0)}</strong></div>
      <div class="fact"><label>止损 / 止盈</label><strong>${pct((risk.stop_loss_pct || 0) * 100, 0)} / ${pct((risk.take_profit_pct || 0) * 100, 0)}</strong></div>
    </div>
    <ul class="risk-list">${(risk.reasons || []).map(x => `<li>${x}</li>`).join("")}</ul>
    <div class="section-title">贝叶斯决策过程</div>
    ${(row.decision_steps || []).map(step => {
      const value = Math.round((step.profit || 0) * 100);
      return `
        <div class="step">
          <span>${step.label}</span>
          <div class="bar"><i style="width:${Math.max(0, Math.min(100, value))}%"></i></div>
          <strong class="num">${value}%</strong>
        </div>
      `;
    }).join("")}
    <div class="notice">${row.model_notice || ""}</div>
  `;
}

async function refreshAll() {
  const btn = document.getElementById("btnRefresh");
  btn.disabled = true;
  btn.textContent = "刷新中";
  try {
    await updateStatus();
    await Promise.all([loadHotRank(), loadAnalysis()]);
  } catch (err) {
    document.getElementById("statusText").textContent = "异常";
    document.getElementById("decisionDetail").innerHTML = `<div class="empty">${err.message}</div>`;
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = "刷新";
  }
}

refreshAll();
setInterval(refreshAll, 30000);
</script>
</body>
</html>
